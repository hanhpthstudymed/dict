<!DOCTYPE html>
<html lang="vi" data-theme="mono">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Hannah's Dict — Multilingual translator with pronunciation" />
  <title>📖 Hannah's Dict</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ============ THEME TOKENS ============ */

    :root[data-theme="mono"] {
      --bg: #ffffff;
      --border: rgba(0, 0, 0, 0.08);
      --border-strong: rgba(0, 0, 0, 0.16);
      --text: #0a0a0a;
      --text-muted: rgba(0, 0, 0, 0.55);
      --text-faint: rgba(0, 0, 0, 0.32);
      --card-bg: #ffffff;
      --card-bg-hover: #f7f7f7;
      --panel-bg: #fafafa;
      --input-bg: #ffffff;
      --btn-bg: #f0f0f0;
      --btn-bg-hover: #e5e5e5;
      --accent: #0a0a0a;
      --accent-on: #ffffff;
      --accent-soft: #ededed;
      --danger: #c43c3c;
    }

    :root[data-theme="light"] {
      --bg: #f8f9fc;
      --border: rgba(0, 0, 0, 0.07);
      --border-strong: rgba(0, 0, 0, 0.12);
      --text: #1c1c1e;
      --text-muted: rgba(0, 0, 0, 0.55);
      --text-faint: rgba(0, 0, 0, 0.35);
      --card-bg: #ffffff;
      --card-bg-hover: rgba(0, 122, 255, 0.04);
      --panel-bg: rgba(0, 0, 0, 0.025);
      --input-bg: #ffffff;
      --btn-bg: rgba(0, 0, 0, 0.05);
      --btn-bg-hover: rgba(0, 0, 0, 0.1);
      --accent: #007aff;
      --accent-on: #ffffff;
      --accent-soft: rgba(0, 122, 255, 0.12);
      --danger: #ff3b30;
    }

    :root[data-theme="dark"] {
      --bg: #0a0a0c;
      --border: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.16);
      --text: #f5f5f7;
      --text-muted: rgba(255, 255, 255, 0.6);
      --text-faint: rgba(255, 255, 255, 0.35);
      --card-bg: #15151a;
      --card-bg-hover: #1e1e24;
      --panel-bg: #111114;
      --input-bg: #15151a;
      --btn-bg: rgba(255, 255, 255, 0.06);
      --btn-bg-hover: rgba(255, 255, 255, 0.12);
      --accent: #ffd66b;
      --accent-on: #0a0a0c;
      --accent-soft: rgba(255, 214, 107, 0.18);
      --danger: #ff6b6b;
    }

    /* ============ BASE ============ */

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
      transition: background 0.2s ease, color 0.2s ease;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 20px 80px;
    }

    /* ============ HEADER ============ */

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0 20px;
    }
    .title {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 600;
      font-size: 26px;
      letter-spacing: -0.02em;
    }
    .title em {
      font-style: italic;
      font-weight: 500;
      color: var(--text-muted);
      font-size: 16px;
      margin-left: 6px;
    }
    .header-actions {
      display: flex;
      gap: 6px;
    }
    .icon-btn {
      width: 36px; height: 36px;
      display: inline-flex; align-items: center; justify-content: center;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text);
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    .icon-btn:hover { background: var(--btn-bg-hover); border-color: var(--border-strong); }
    .icon-btn:active { transform: scale(0.94); }
    .icon-btn.active { background: var(--accent-soft); border-color: var(--accent); }

    /* ============ PANEL ============ */

    .panel {
      display: none;
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 18px;
    }
    .panel.open { display: block; }
    .panel-section { margin-bottom: 16px; }
    .panel-section:last-child { margin-bottom: 0; }
    .panel-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .link-btn {
      background: none; border: none; color: var(--text-muted);
      font-size: 12px; cursor: pointer; padding: 2px 6px; border-radius: 6px;
      text-transform: none; letter-spacing: 0; font-weight: 500;
    }
    .link-btn:hover { background: var(--btn-bg); color: var(--text); }
    .chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      padding: 7px 12px; font-size: 13px;
      border: 1px solid var(--border); border-radius: 999px;
      background: var(--card-bg);
      cursor: pointer; user-select: none;
      transition: all 0.15s;
    }
    .chip:hover { background: var(--btn-bg-hover); }
    .chip.active { background: var(--accent); color: var(--accent-on); border-color: var(--accent); }
    .lang-options { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 6px; }
    .lang-options .chip { text-align: center; }

    /* ============ INPUT ============ */

    .input-row {
      display: flex; gap: 8px; align-items: center;
      margin-bottom: 14px;
    }
    .input-wrapper {
      flex: 1; position: relative;
    }
    #wordInput {
      width: 100%;
      padding: 14px 40px 14px 16px;
      font-family: inherit;
      font-size: 16px;
      color: var(--text);
      background: var(--input-bg);
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    #wordInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .clear-input {
      position: absolute; right: 8px; top: 50%;
      transform: translateY(-50%);
      width: 26px; height: 26px;
      border: none; background: var(--btn-bg);
      color: var(--text-muted);
      border-radius: 50%; cursor: pointer;
      display: none; align-items: center; justify-content: center;
      font-size: 16px; line-height: 1;
    }
    .clear-input.visible { display: inline-flex; }
    .clear-input:hover { background: var(--btn-bg-hover); color: var(--text); }
    .translate-btn {
      padding: 0 18px; height: 48px;
      background: var(--accent); color: var(--accent-on);
      border: none; border-radius: 12px;
      font-family: inherit; font-weight: 600; font-size: 14px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .translate-btn:hover { opacity: 0.88; }
    .translate-btn:active { transform: scale(0.97); }

    /* ============ RESULTS ============ */

    .results { display: flex; flex-direction: column; gap: 10px; }
    .loading, .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-faint);
      font-family: "Fraunces", Georgia, serif;
      font-style: italic;
      font-size: 17px;
    }
    .loading.spin::after {
      content: "";
      display: inline-block;
      width: 10px; height: 10px;
      border: 2px solid var(--text-faint);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-left: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .source-card {
      background: var(--accent-soft);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      margin-bottom: 4px;
    }
    .source-label {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 4px;
      display: flex; align-items: center; gap: 6px;
    }
    .source-word {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 600;
      font-size: 24px;
      letter-spacing: -0.01em;
      word-break: break-word;
    }
    .source-pron {
      font-family: "JetBrains Mono", monospace;
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .lang-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex; align-items: flex-start; gap: 12px;
      animation: fadeUp 0.25s ease both;
      transition: background 0.15s, border-color 0.15s;
    }
    .lang-card:hover { background: var(--card-bg-hover); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .lang-flag {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
      background: var(--panel-bg);
      border-radius: 10px;
    }
    .lang-body { flex: 1; min-width: 0; }
    .lang-name {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 3px;
    }
    .lang-text {
      font-size: 17px;
      font-weight: 500;
      word-break: break-word;
      line-height: 1.4;
    }
    .lang-pron {
      margin-top: 4px;
      font-family: "JetBrains Mono", monospace;
      font-size: 12.5px;
      color: var(--text-muted);
    }
    .lang-actions {
      display: flex; gap: 4px;
      align-self: center;
      flex-shrink: 0;
    }
    .mini-btn {
      width: 30px; height: 30px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-muted);
      border-radius: 8px; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 13px;
      transition: background 0.15s, color 0.15s;
    }
    .mini-btn:hover { background: var(--btn-bg); color: var(--text); }
    .mini-btn.playing { color: var(--accent); animation: pulse 1s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }

    /* ============ HISTORY / FAVORITES LIST ============ */

    .list-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.12s;
    }
    .list-item:hover { background: var(--btn-bg); }
    .list-item-word { font-size: 14px; }
    .list-item-meta { font-size: 11px; color: var(--text-faint); }
    .list-item-del {
      opacity: 0; transition: opacity 0.15s;
      background: none; border: none; color: var(--text-faint);
      cursor: pointer; font-size: 14px;
      padding: 2px 6px;
    }
    .list-item:hover .list-item-del { opacity: 1; }
    .list-item-del:hover { color: var(--danger); }
    .empty-list {
      text-align: center;
      padding: 24px 12px;
      color: var(--text-faint);
      font-size: 13px;
      font-style: italic;
    }

    /* ============ TOAST ============ */
    .toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--accent); color: var(--accent-on);
      padding: 9px 16px; border-radius: 999px;
      font-size: 13px; font-weight: 500;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 100;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ============ FOOTER ============ */
    .footer {
      text-align: center;
      margin-top: 32px;
      font-size: 11px;
      color: var(--text-faint);
      letter-spacing: 0.04em;
    }
    .footer a { color: inherit; }

    /* ============ MOBILE ============ */
    @media (max-width: 520px) {
      .container { padding: 16px 14px 60px; }
      .title { font-size: 22px; }
      .title em { display: none; }
      #wordInput { font-size: 15px; padding: 12px 36px 12px 14px; }
      .translate-btn { padding: 0 14px; height: 44px; }
      .lang-text { font-size: 15.5px; }
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- HEADER -->
    <div class="header">
      <div class="title">
        📖 Hannah's Dict<em data-i18n="subtitle">— smart translator</em>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="historyBtn" title="History">🕒</button>
        <button class="icon-btn" id="favBtn" title="Favorites">⭐</button>
        <button class="icon-btn" id="settingsBtn" title="Settings">⚙</button>
      </div>
    </div>

    <!-- HISTORY PANEL -->
    <div class="panel" id="historyPanel">
      <div class="panel-section">
        <div class="panel-title">
          <span data-i18n="historyTitle">Search history</span>
          <button class="link-btn" id="clearHistoryBtn" data-i18n="clearAll">Clear all</button>
        </div>
        <div id="historyList"></div>
      </div>
    </div>

    <!-- FAVORITES PANEL -->
    <div class="panel" id="favPanel">
      <div class="panel-section">
        <div class="panel-title">
          <span data-i18n="favTitle">Favorites</span>
          <button class="link-btn" id="clearFavBtn" data-i18n="clearAll">Clear all</button>
        </div>
        <div id="favList"></div>
      </div>
    </div>

    <!-- SETTINGS PANEL -->
    <div class="panel" id="settingsPanel">
      <div class="panel-section">
        <div class="panel-title" data-i18n="interfaceLang">Interface language</div>
        <div class="chip-row">
          <div class="chip" data-ui-lang="en">🇬🇧 English</div>
          <div class="chip" data-ui-lang="vi">🇻🇳 Tiếng Việt</div>
        </div>
      </div>
      <div class="panel-section">
        <div class="panel-title" data-i18n="appearance">Appearance</div>
        <div class="chip-row">
          <div class="chip" data-theme-pick="mono" data-i18n="themeMono">◐ Minimal</div>
          <div class="chip" data-theme-pick="light" data-i18n="themeLight">☀️ Light</div>
          <div class="chip" data-theme-pick="dark" data-i18n="themeDark">🌙 Dark</div>
        </div>
      </div>
      <div class="panel-section">
        <div class="panel-title" data-i18n="displayLangs">Display languages</div>
        <div class="lang-options" id="langOptions"></div>
      </div>
    </div>

    <!-- INPUT -->
    <div class="input-row">
      <div class="input-wrapper">
        <input
          id="wordInput"
          type="text"
          autocomplete="off"
          spellcheck="false"
          autofocus
        />
        <button class="clear-input" id="clearInputBtn" title="Clear">×</button>
      </div>
      <button class="translate-btn" id="translateBtn" data-i18n="translate">Translate</button>
    </div>

    <!-- RESULTS -->
    <div class="results" id="results">
      <div class="empty" data-i18n="welcome">Type a word and press Enter to translate</div>
    </div>

    <div class="footer">
      <span data-i18n="poweredBy">Powered by Google Translate · Free Dictionary API</span>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    /* ============ I18N ============ */
    const I18N = {
      en: {
        subtitle: "— smart translator",
        translate: "Translate",
        welcome: "Type a word and press Enter to translate",
        translating: "Translating",
        historyTitle: "Search history",
        favTitle: "Favorites",
        clearAll: "Clear all",
        noHistory: "No words yet",
        noFav: "No favorites yet — tap ⭐ next to a result",
        interfaceLang: "Interface language",
        appearance: "Appearance",
        displayLangs: "Display languages",
        themeMono: "◐ Minimal",
        themeLight: "☀️ Light",
        themeDark: "🌙 Dark",
        sourceLabel: "Source",
        copied: "✓ Copied",
        added: "★ Added to favorites",
        removed: "Removed from favorites",
        cleared: "Cleared",
        poweredBy: "Powered by Google Translate · Free Dictionary API",
        translateError: "Translation error — please try again",
        tooLong: "Too long — keep it under 200 characters",
      },
      vi: {
        subtitle: "— từ điển thông minh",
        translate: "Dịch",
        welcome: "Gõ một từ rồi nhấn Enter để dịch",
        translating: "Đang dịch",
        historyTitle: "Lịch sử tra cứu",
        favTitle: "Yêu thích",
        clearAll: "Xoá hết",
        noHistory: "Chưa có từ nào",
        noFav: "Chưa có từ yêu thích — bấm ⭐ cạnh kết quả",
        interfaceLang: "Ngôn ngữ giao diện",
        appearance: "Giao diện",
        displayLangs: "Ngôn ngữ hiển thị",
        themeMono: "◐ Tối giản",
        themeLight: "☀️ Sáng",
        themeDark: "🌙 Tối",
        sourceLabel: "Gốc",
        copied: "✓ Đã sao chép",
        added: "★ Đã lưu yêu thích",
        removed: "Đã bỏ yêu thích",
        cleared: "Đã xoá",
        poweredBy: "Cung cấp bởi Google Translate · Free Dictionary API",
        translateError: "Lỗi khi dịch — vui lòng thử lại",
        tooLong: "Quá dài — vui lòng nhập dưới 200 ký tự",
      },
    };

    const LANGUAGES = {
      en:      { name: "EN", label: "English",            flag: "🇬🇧" },
      vi:      { name: "VN", label: "Tiếng Việt",          flag: "🇻🇳" },
      "zh-CN": { name: "CN", label: "中文 (简体)",         flag: "🇨🇳" },
      "zh-TW": { name: "TW", label: "中文 (繁體)",         flag: "🇹🇼" },
      ja:      { name: "JP", label: "日本語",              flag: "🇯🇵" },
      ko:      { name: "KO", label: "한국어",              flag: "🇰🇷" },
    };

    /* ============ STATE (persisted in localStorage) ============ */

    const LS_KEYS = {
      ui: "dict.uiLang",
      theme: "dict.theme",
      langs: "dict.enabledLangs",
      history: "dict.history",
      favorites: "dict.favorites",
    };

    function lsGet(key, fallback) {
      try {
        const v = localStorage.getItem(key);
        return v === null ? fallback : JSON.parse(v);
      } catch { return fallback; }
    }
    function lsSet(key, value) {
      try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
    }

    let uiLang = lsGet(LS_KEYS.ui, "vi");
    let theme = lsGet(LS_KEYS.theme, "mono");
    let enabledLangs = lsGet(LS_KEYS.langs, Object.keys(LANGUAGES));
    let history = lsGet(LS_KEYS.history, []);
    let favorites = lsGet(LS_KEYS.favorites, []);

    function t(key) { return (I18N[uiLang] && I18N[uiLang][key]) || I18N.en[key] || key; }

    /* ============ LANGUAGE DETECTION (port từ Python) ============ */

    // Ký tự chỉ có trong Phồn Thể (Traditional Chinese)
    const TRADITIONAL_ONLY = new Set(
      // Bopomofo (chú âm)
      "ㄅㄆㄇㄈㄉㄊㄋㄌㄍㄎㄏㄐㄑㄒㄓㄔㄕㄖㄗㄘㄙㄚㄛㄜㄝㄞㄟㄠㄡㄢㄣㄤㄥㄦㄧㄨㄩ" +
      // Hán tự chỉ có trong Phồn Thể (đã lọc kĩ ký tự giản thể)
      "經學會與為時對進來說從這樣實現發展動關係資數據訊構處應該設計們體醫藥開關閉" +
      "網絡電腦電話視聽讀寫書報紙誌雜證據認識別準確總計劃過愛戀" +
      "語車門風飛馬鳥魚麵點麼難見覺買賣貴錢頭臉腦腳龍龜貝黃綠藍紅線軟髮後麗廣廠廳樓" +
      "機橋燈燒熱壓寶專業藝圖圓變禮讓還選邊運達鄉鄧鐘鐵銀銅錯鎖鏡長張陽陰隊雞雙靜響" +
      "頁頂顏類顧願題額飯飲餓餅館驗驚驛驢鬧鬥鬱燦爛燭爐爭奪奮婦嬰嬌孃寵屬嶺嶽峽島崑崙" +
      "帳幣幫庫廢彈彎彌彙徑憂懷態慣慶憲懲戰戲戶擔據擴攝攔攪敵斃斬晝曆曉暈曠棄榮榪槍樹" +
      "樣檔檢櫃櫻權歡歲歷歸殘殼毀氣滅濕灣濤濫瀉爺牆獄獨獲瑩甕癡盜監盤盞礦碼磚禍禪稅窩" +
      "竄競筆築籃糧糾紀紋納紗紐純紛紙級紜紡紮紹終細組絆綁絨結絕絲絛絹綜綢維綱緊緒編緣" +

      "斂斷無晉暫棗棟棲極標樞樸檯檻櫥欄歐歟殞殲殺毆毿氈氫漢湧滯滾滿漁漸潛澀濃濟瀋灑爐" +
      "牽犧狀獅獻玀琺瑪甦瘋癢癬皚盧睏睪硃祕禦稈窮竅簾簽糞紳統繪繳罵羈聰聶職脣脹腎臍艙" +
      "艤艸莖華萊著蔣蕭薑蘆虛蟲襯覓覽訃訓訊記討訝許論講謝譚譽豈豎豬貓費賀趕跪踴轎辮辯" +
      "農逕遜遷郵鄺醃釋釐鑄鑑閔閣閥隸難靈韜頰顛顫飆飾餘騁驀髒鬚魘魷鮑鮫鵑鶴鹹鹽冪凱凳" +
      "刪剎勸勻匱啞噴嚐嚥囑壙壢夾妝娛嫿宮屜巔幟幹廝徬憑懇戩戾拚挽捲掄掙摯撈撐擬擲攆斕" +
      "曬棧槓樁檸櫓櫛欽殯毯氬沓洩淒淩淪渦滲滷潁潰瀾瀰燼獺玨璣甌癱眥瞞矚礙禱穌窺簫籤糰" +
      "絞綽綺緲縷繕羨聾薈薔藹蘊蠅襲覈覬訣詠誣諒譏譴豔貳賑賬贈躍轅轍邏醞釁鈣鉑銬銷鋸錐" +
      "錫鍊闡隴霽韃颱餵餾駭騷魎鱉鷗麴齣"
    );

    const VI_REGEX = /[àáảãạăằắẳẵặâầấẩẫậèéẻẽẹêềếểễệìíỉĩịòóỏõọôồốổỗộơờớởỡợùúủũụưừứửữựỳýỷỹỵđ]/i;
    const KO_REGEX = /[\uAC00-\uD7AF]/;
    const JA_KANA_REGEX = /[\u3040-\u309F\u30A0-\u30FF]/;
    const HAN_REGEX = /[\u4E00-\u9FFF]/;

    function detectLanguage(text) {
      const s = text.trim();
      if (VI_REGEX.test(s)) return "vi";
      if (KO_REGEX.test(s)) return "ko";
      if (JA_KANA_REGEX.test(s)) return "ja";
      if (HAN_REGEX.test(s)) {
        for (const ch of s) {
          if (TRADITIONAL_ONLY.has(ch)) return "zh-TW";
        }
        return "zh-CN";
      }
      return "en";
    }

    /* ============ API ============ */

    async function translateText(text, source, target) {
      if (source === target) return text;
      try {
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${source}&tl=${target}&dt=t&q=${encodeURIComponent(text)}`;
        const res = await fetch(url);
        const data = await res.json();
        if (!data || !data[0]) return null;
        return data[0].map(seg => seg[0]).filter(Boolean).join("");
      } catch (e) {
        console.error("translate error:", e);
        return null;
      }
    }

    async function getGoogleRomanization(text, lang) {
      try {
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${lang}&tl=en&dt=rm&q=${encodeURIComponent(text)}`;
        const res = await fetch(url);
        const data = await res.json();
        if (data && data[0]) {
          for (const item of data[0]) {
            if (item[3]) return item[3];
            if (item[2]) return item[2];
          }
        }
      } catch (e) { console.error("romanization error:", e); }
      return null;
    }

    async function getEnglishIPA(text) {
      try {
        const word = text.toLowerCase().trim().split(/\s+/)[0];
        if (!word) return null;
        const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
        if (!res.ok) return null;
        const data = await res.json();
        if (data[0] && data[0].phonetics) {
          for (const p of data[0].phonetics) {
            if (p.text) return p.text;
          }
        }
      } catch (e) { console.error("IPA error:", e); }
      return null;
    }

    const ROMANIZABLE = new Set(["zh-CN", "zh-TW", "ja", "ko"]);
    const pronCache = new Map();

    async function getPronunciation(text, lang) {
      if (!text) return null;
      const key = lang + "::" + text;
      if (pronCache.has(key)) return pronCache.get(key);
      let result = null;
      if (lang === "en")          result = await getEnglishIPA(text);
      else if (ROMANIZABLE.has(lang)) result = await getGoogleRomanization(text, lang);
      pronCache.set(key, result);
      return result;
    }

    /* ============ TTS ============ */

    let currentAudio = null;
    let currentBtn = null;

    function stopAudio() {
      if (currentAudio) { try { currentAudio.pause(); } catch {} currentAudio = null; }
      if (currentBtn)  { currentBtn.classList.remove("playing"); currentBtn = null; }
    }

    function speak(text, lang, btn) {
      if (!text) return;
      stopAudio();
      const safe = text.slice(0, 200);
      const tl = lang === "zh-TW" ? "zh-TW" : lang;
      const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(safe)}&tl=${tl}&client=tw-ob`;
      const audio = new Audio(url);
      currentAudio = audio;
      currentBtn = btn;
      btn && btn.classList.add("playing");
      const cleanup = () => {
        btn && btn.classList.remove("playing");
        if (currentAudio === audio) currentAudio = null;
        if (currentBtn === btn) currentBtn = null;
      };
      audio.addEventListener("ended", cleanup);
      audio.addEventListener("error", cleanup);
      audio.play().catch(err => { console.error("TTS error:", err); cleanup(); });
    }

    /* ============ MAIN ============ */

    const wordInput   = document.getElementById("wordInput");
    const clearBtn    = document.getElementById("clearInputBtn");
    const translateBtn = document.getElementById("translateBtn");
    const resultsEl   = document.getElementById("results");
    const historyBtn  = document.getElementById("historyBtn");
    const favBtn      = document.getElementById("favBtn");
    const settingsBtn = document.getElementById("settingsBtn");
    const panels = {
      history: document.getElementById("historyPanel"),
      fav:      document.getElementById("favPanel"),
      settings: document.getElementById("settingsPanel"),
    };
    const toastEl = document.getElementById("toast");

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toastEl.classList.remove("show"), 1500);
    }

    async function translate(word) {
      if (!word) return;
      if (word.length > 200) { showToast(t("tooLong")); return; }

      stopAudio();
      addToHistory(word);
      resultsEl.innerHTML = `<div class="loading spin">${escapeHtml(t("translating"))}</div>`;

      const sourceLang = detectLanguage(word);
      const sourcePron = await getPronunciation(word, sourceLang);

      // Dịch song song sang các ngôn ngữ đang bật (trừ source)
      const targets = enabledLangs.filter(l => l !== sourceLang);
      const items = await Promise.all(
        targets.map(async lang => {
          const translated = await translateText(word, sourceLang, lang);
          if (!translated) return { lang, translated: null, pron: null };
          const pron = await getPronunciation(translated, lang);
          return { lang, translated, pron };
        })
      );

      renderResult(word, sourceLang, sourcePron, items);
    }

    function renderResult(word, sourceLang, sourcePron, items) {
      const sInfo = LANGUAGES[sourceLang] || { flag: "🌐", label: sourceLang, name: sourceLang };

      let html = `
        <div class="source-card">
          <div class="source-label">
            ${sInfo.flag} ${escapeHtml(sInfo.label)} · ${escapeHtml(t("sourceLabel"))}
          </div>
          <div class="source-word">${escapeHtml(word)}</div>
          ${sourcePron ? `<div class="source-pron">${escapeHtml(sourcePron)}</div>` : ""}
        </div>
      `;

      for (const it of items) {
        const info = LANGUAGES[it.lang];
        if (!info) continue;
        const text = it.translated || "—";
        const isFav = isFavorite(word, it.lang, text);
        html += `
          <div class="lang-card">
            <div class="lang-flag">${info.flag}</div>
            <div class="lang-body">
              <div class="lang-name">${escapeHtml(info.label)}</div>
              <div class="lang-text">${escapeHtml(text)}</div>
              ${it.pron ? `<div class="lang-pron">${escapeHtml(it.pron)}</div>` : ""}
            </div>
            <div class="lang-actions">
              <button class="mini-btn" data-action="speak" data-lang="${it.lang}" data-text="${escapeHtml(text)}" title="Listen">🔊</button>
              <button class="mini-btn" data-action="copy" data-text="${escapeHtml(text)}" title="Copy">⧉</button>
              <button class="mini-btn" data-action="fav" data-lang="${it.lang}" data-text="${escapeHtml(text)}" data-word="${escapeHtml(word)}" title="Favorite">${isFav ? "★" : "☆"}</button>
            </div>
          </div>
        `;
      }

      resultsEl.innerHTML = html;
    }

    // Event delegation cho mini buttons
    resultsEl.addEventListener("click", (e) => {
      const btn = e.target.closest(".mini-btn");
      if (!btn) return;
      const action = btn.dataset.action;
      if (action === "speak") {
        speak(btn.dataset.text, btn.dataset.lang, btn);
      } else if (action === "copy") {
        navigator.clipboard.writeText(btn.dataset.text).then(() => showToast(t("copied")));
      } else if (action === "fav") {
        toggleFavorite(btn.dataset.word, btn.dataset.lang, btn.dataset.text);
        btn.textContent = isFavorite(btn.dataset.word, btn.dataset.lang, btn.dataset.text) ? "★" : "☆";
      }
    });

    /* ============ HISTORY ============ */

    function addToHistory(word) {
      history = history.filter(h => h.word !== word);
      history.unshift({ word, ts: Date.now() });
      if (history.length > 50) history = history.slice(0, 50);
      lsSet(LS_KEYS.history, history);
      renderHistory();
    }

    function renderHistory() {
      const el = document.getElementById("historyList");
      if (!history.length) {
        el.innerHTML = `<div class="empty-list">${escapeHtml(t("noHistory"))}</div>`;
        return;
      }
      el.innerHTML = history.map(h => `
        <div class="list-item" data-word="${escapeHtml(h.word)}">
          <span class="list-item-word">${escapeHtml(h.word)}</span>
          <button class="list-item-del" data-del="${escapeHtml(h.word)}" title="Remove">×</button>
        </div>
      `).join("");
    }

    document.getElementById("historyList").addEventListener("click", (e) => {
      const del = e.target.closest("[data-del]");
      if (del) {
        e.stopPropagation();
        history = history.filter(h => h.word !== del.dataset.del);
        lsSet(LS_KEYS.history, history);
        renderHistory();
        return;
      }
      const item = e.target.closest(".list-item");
      if (item) {
        wordInput.value = item.dataset.word;
        translate(item.dataset.word);
      }
    });

    document.getElementById("clearHistoryBtn").onclick = () => {
      history = []; lsSet(LS_KEYS.history, history); renderHistory();
      showToast(t("cleared"));
    };

    /* ============ FAVORITES ============ */

    function favKey(word, lang, text) { return `${word}|${lang}|${text}`; }
    function isFavorite(word, lang, text) {
      return favorites.some(f => favKey(f.word, f.lang, f.text) === favKey(word, lang, text));
    }
    function toggleFavorite(word, lang, text) {
      const k = favKey(word, lang, text);
      const idx = favorites.findIndex(f => favKey(f.word, f.lang, f.text) === k);
      if (idx >= 0) {
        favorites.splice(idx, 1);
        showToast(t("removed"));
      } else {
        favorites.unshift({ word, lang, text, ts: Date.now() });
        if (favorites.length > 200) favorites = favorites.slice(0, 200);
        showToast(t("added"));
      }
      lsSet(LS_KEYS.favorites, favorites);
      renderFavorites();
    }

    function renderFavorites() {
      const el = document.getElementById("favList");
      if (!favorites.length) {
        el.innerHTML = `<div class="empty-list">${escapeHtml(t("noFav"))}</div>`;
        return;
      }
      el.innerHTML = favorites.map(f => {
        const info = LANGUAGES[f.lang] || { flag: "🌐", name: f.lang };
        return `
          <div class="list-item" data-fav-word="${escapeHtml(f.word)}">
            <span class="list-item-word">
              <strong>${escapeHtml(f.word)}</strong>
              <span class="list-item-meta"> → ${info.flag} ${escapeHtml(f.text)}</span>
            </span>
            <button class="list-item-del" data-fav-del="${escapeHtml(favKey(f.word, f.lang, f.text))}" title="Remove">×</button>
          </div>
        `;
      }).join("");
    }

    document.getElementById("favList").addEventListener("click", (e) => {
      const del = e.target.closest("[data-fav-del]");
      if (del) {
        e.stopPropagation();
        favorites = favorites.filter(f => favKey(f.word, f.lang, f.text) !== del.dataset.favDel);
        lsSet(LS_KEYS.favorites, favorites);
        renderFavorites();
        return;
      }
      const item = e.target.closest("[data-fav-word]");
      if (item) {
        wordInput.value = item.dataset.favWord;
        translate(item.dataset.favWord);
      }
    });

    document.getElementById("clearFavBtn").onclick = () => {
      favorites = []; lsSet(LS_KEYS.favorites, favorites); renderFavorites();
      showToast(t("cleared"));
    };

    /* ============ SETTINGS ============ */

    function applyTheme() {
      document.documentElement.setAttribute("data-theme", theme);
      document.querySelectorAll("[data-theme-pick]").forEach(el => {
        el.classList.toggle("active", el.dataset.themePick === theme);
      });
    }

    function applyUiLang() {
      document.documentElement.setAttribute("lang", uiLang);
      document.querySelectorAll("[data-i18n]").forEach(el => {
        el.textContent = t(el.dataset.i18n);
      });
      wordInput.placeholder = uiLang === "vi"
        ? "Gõ một từ rồi nhấn Enter..."
        : "Type a word and press Enter...";
      document.querySelectorAll("[data-ui-lang]").forEach(el => {
        el.classList.toggle("active", el.dataset.uiLang === uiLang);
      });
      renderHistory();
      renderFavorites();
      renderLangOptions();
    }

    function renderLangOptions() {
      const el = document.getElementById("langOptions");
      el.innerHTML = Object.entries(LANGUAGES).map(([code, info]) => `
        <div class="chip ${enabledLangs.includes(code) ? "active" : ""}" data-lang-toggle="${code}">
          ${info.flag} ${escapeHtml(info.label)}
        </div>
      `).join("");
    }

    document.getElementById("langOptions").addEventListener("click", (e) => {
      const chip = e.target.closest("[data-lang-toggle]");
      if (!chip) return;
      const code = chip.dataset.langToggle;
      if (enabledLangs.includes(code)) {
        if (enabledLangs.length <= 1) return; // ít nhất 1 ngôn ngữ
        enabledLangs = enabledLangs.filter(l => l !== code);
      } else {
        enabledLangs.push(code);
      }
      lsSet(LS_KEYS.langs, enabledLangs);
      renderLangOptions();
    });

    document.querySelectorAll("[data-theme-pick]").forEach(el => {
      el.onclick = () => { theme = el.dataset.themePick; lsSet(LS_KEYS.theme, theme); applyTheme(); };
    });
    document.querySelectorAll("[data-ui-lang]").forEach(el => {
      el.onclick = () => { uiLang = el.dataset.uiLang; lsSet(LS_KEYS.ui, uiLang); applyUiLang(); };
    });

    /* ============ PANEL TOGGLE ============ */

    function togglePanel(name, btn) {
      const isOpen = panels[name].classList.contains("open");
      Object.values(panels).forEach(p => p.classList.remove("open"));
      [historyBtn, favBtn, settingsBtn].forEach(b => b.classList.remove("active"));
      if (!isOpen) {
        panels[name].classList.add("open");
        btn.classList.add("active");
      }
    }
    historyBtn.onclick  = () => togglePanel("history", historyBtn);
    favBtn.onclick      = () => togglePanel("fav", favBtn);
    settingsBtn.onclick = () => togglePanel("settings", settingsBtn);

    /* ============ INPUT EVENTS ============ */

    wordInput.addEventListener("input", () => {
      clearBtn.classList.toggle("visible", wordInput.value.length > 0);
    });
    wordInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        translate(wordInput.value.trim());
      }
    });
    clearBtn.onclick = () => {
      wordInput.value = ""; clearBtn.classList.remove("visible"); wordInput.focus();
    };
    translateBtn.onclick = () => translate(wordInput.value.trim());

    /* ============ INIT ============ */

    applyTheme();
    applyUiLang();
    renderHistory();
    renderFavorites();
    renderLangOptions();
  </script>
</body>
